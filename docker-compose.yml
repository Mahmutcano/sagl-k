services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-medical_consultation}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mcp}:${POSTGRES_PASSWORD:-mcp_secret}@postgres:5432/${POSTGRES_DB:-medical_consultation}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      API_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
